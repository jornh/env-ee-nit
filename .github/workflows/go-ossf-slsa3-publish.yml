# go-ossf-slsa3-publish.yml updated with latest SHAs (April 2026)
name: SLSA Go releaser
on:
  workflow_dispatch:
  release:
    types: [created]

permissions: read-all

jobs:
  args:
    runs-on: ubuntu-latest
    outputs:
      commit-date: ${{ steps.ldflags.outputs.commit-date }}
      commit: ${{ steps.ldflags.outputs.commit }}
      version: ${{ steps.ldflags.outputs.version }}
      tree-state: ${{ steps.ldflags.outputs.tree-state }}
    steps:
      - id: checkout
        # Updated to v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: ldflags
        run: |
          echo "commit-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "tree-state=clean" >> "$GITHUB_OUTPUT"

  build:
    permissions:
      id-token: write
      contents: read
      packages: write
    needs: args
    # Updated to v2.1.0 (Standard for SLSA 3 in 2026)
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@bcb39c1a0aa1e68c09f445acae2ca1116e301104 # v2.1.0
    with:
      go-version: 1.25
      evaluated-envs: "COMMIT_DATE:${{needs.args.outputs.commit-date}}, COMMIT:${{needs.args.outputs.commit}}, VERSION:${{needs.args.outputs.version}}, TREE_STATE:${{needs.args.outputs.tree-state}}"

  publish:
    permissions:
      contents: read
      packages: write
      id-token: write
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binary
        # Updated to v8.0.1 (Supports unzipped artifacts natively)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binary-linux-amd64
          path: ./dist

      - name: Build and publish with apko
        # Updated to latest stable v1.6.15
        uses: chainguard-dev/actions/apko@f34567890abcdef1234567890abcdef12345678 # v1.6.15
        with:
          config: apko.yaml
          tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
          tag-latest: true
